[Settings]
; Upscaling reconstructs lower resolutions to the native resolution using advanced algorithms, improving image quality and performance.
; AMD Robust Contrast Adaptive Sharpening improves image clarity, even when upscaling is disabled or in 3D menus.
; When ENBSeries is active, only DLAA is available.

; NVIDIA DLSS 4 is automatically used if available, otherwise AMD FSR 3.1 is used.
; Default: 2 (0 = Disabled, 1 = FSR, 2 = DLSS)
iUpscaleMethodPreference = 2

; Controls the internal resolution.
; Default: 1 (1=Quality, 2=Balanced, 3=Performance, 4=Ultra Performance, 0=Native AA)
iQualityMode = 1

; Upscaler sharpening amount. DLSS uses NVIDIA Image Scaling sharpen; FSR uses RCAS.
; Default: 0.15 (0.0=Off, 1.0=Maximum)
fSharpness = 0.15

; NVIDIA DLSS Frame Generation mode.
; Default: 0 (0=Disabled, 1=On, 2=Auto)
iFrameGenerationMode = 0

; Number of generated frames inserted between rendered frames. Unsupported values are clamped by the NVIDIA runtime.
; Default: 0 (0=1 generated frame / 2x, 1=2 generated frames / 3x, 2=3 generated frames / 4x, 3=4 generated frames / 5x, 4=5 generated frames / 6x)
iDLSSGGeneratedFrames = 0

; Enables NVIDIA DLSS Dynamic Multi Frame Generation when supported by the runtime.
; Default: 0 (0=Disabled, 1=Enabled)
bDynamicMFGEnabled = 0

; Target output FPS for Dynamic Multi Frame Generation. Set to 0 to let Streamline auto-detect the display refresh rate.
; Default: 300
iDynamicMFGTargetFPS = 300

; NVIDIA Reflex low latency mode. DLSS Frame Generation forces at least On while active.
; Default: 1 (0=Off, 1=On, 2=On + Boost)
iReflexMode = 1

; DLSS model preset. Recommended uses K for DLAA/Quality/Balanced, M for Performance, and L for Ultra Performance.
; Default: 0 (0=Recommended, 1=Default, 2=K, 3=M, 4=L)
iDLSSModelPreset = 0

; Displays lightweight DX12 swapchain debug stats in the top-left corner.
; Default: 0 (0=Disabled, 1=Enabled)
bOnScreenDisplay = 0

; Displays current DX12 upscaler inputs as a 2x2 debug view.
; Default: 0 (0=Disabled, 1=Enabled)
bTaggedTextureDebug = 0
